  - name: Hot tub patio
    slug: driveway_top_magnolia       # slug retained as stable id; area renamed from "Driveway top backdrop tree"
    sun: full sun
    exposure: |
      Behind / above the linear sp5 driveway-top bed. Mountainside, open
      to fall wind (summer is calm at this site — wind hits in autumn).
      Site against the house wall or in the lee of natural windbreak if
      possible — magnolia wood is moderately brittle and large flowers
      can shred in sustained wind.
    deer_pressure: low                 # magnolias rated deer-resistant
    theme: late-blooming flowering tree, frost-safe for mountainside
    notes: |
      Backdrop tree for the sp5 driveway-top palette (lavender / blue /
      apricot / yellow / white). Reddish-purple tulip-shaped flowers
      late April–early May — hands off to the sp5 perennials as they
      come on. Mature ~12 ft × 10 ft; place 8–12 ft behind the bed
      with sufficient root run.

      Why 'Jane' over 'Royal Star': bred at the US National Arboretum
      (1955, "Little Girl" series) specifically for late bloom to avoid
      the late-frost wipeouts that hit Royal Star and other early-
      blooming magnolias on cold-pocket sites like ours. Blooms 2–3
      weeks later than Royal Star, comfortably past most last-frost
      dates for central PA mountainside.

    pre_purchase_checklist: |
      Before buying — call Diller and confirm THREE things about the
      'Jane' specimen they have in stock. The answers determine whether
      we plant spring 2026 or wait until spring 2027:

        1. Container or B&B (balled-and-burlapped)?
           - Container-grown: more flexible — plantable spring through
             early summer with diligent watering.
           - B&B: best planted while dormant or just-budding. Once
             fully leafed out, transplant success drops sharply.

        2. Current growth stage?
           - Dormant / just-budding: ✅ plant now (within 2 weeks).
           - Just-leafing (small tender leaves emerging): marginal —
             plant within 1–2 weeks, water aggressively all summer.
           - Fully leafed out: 🛑 wait until spring 2027 — losing one
             season barely affects long-term sequencing for a slow
             grower like 'Jane'.

        3. Will they hold the specimen for 1–2 weeks while site is
           prepped (staking, mulch, hole dug)?

      Site prep — propane tank clearance:
        - Site the trunk at least 15 ft from the buried propane tank
          (mature canopy ~10 ft, roots extend 1.5–2× dripline).
        - Call 811 (PA One Call) before digging to mark the propane
          line from tank to house — do not plant directly over it.
        - Keep a clear truck approach to the tank's fill dome for
          refills.

      Planting timing rationale: SPRING planting (not fall) for this
      site because our wind hits in autumn, not summer. A spring-
      planted tree gets a calm summer to establish roots before facing
      the first fall windy season with at least one growing season's
      anchoring already in place.

    plants:
      - name: Magnolia liliiflora 'Jane'
        common_name: Jane Magnolia (Little Girl series)
        quantity: 1
        source: Diller
        target_size: 5–6 ft, $143 (catalog id 312)
        role: |
          Late-blooming compact magnolia, ~10–15 ft × 8–12 ft mature.
          Reddish-purple tulip-shaped flowers with near-white interior,
          April–May. Sometimes reblooms lightly in midsummer. Late
          leaf-out (flowers open before leaves — uninterrupted bloom
          show). Hardy zone 4–8, tolerates full sun, slow grower at
          6–12"/yr.
        establishment_care: |
          Stake aggressively for 2–3 years (3 stakes spaced around
          trunk, flexible ties — allow some sway). Mulch ring 3" deep,
          3 ft diameter, kept off the trunk. Deep weekly watering
          through summer years 1 and 2. No fertilizer year 1 — let
          roots establish. Heavy fall mulch year 1 to insulate against
          freeze-thaw. Don't prune in fall (stimulates non-hardened
          growth). First reliable bloom usually year 2 or 3.
        status: pending Diller stock check (2026-04-26) — see pre_purchase_checklist

      - name: Lonicera periclymenum 'Scentsation'
        common_name: Scentsation Honeysuckle (woodbine)
        quantity: 1
        source: TBD — not stocked at Diller or Stauffer's; source via mail-order
          (Bluestone Perennials, Wayside Gardens) or call around to local nurseries
        target_size: "#1 or #2 container"
        role: |
          Fragrant flowering vine to climb the hot tub pergola. Bred and
          selected specifically for scent — strong sweet honeysuckle
          fragrance, yellow tubular flowers May through first frost, red
          berries in fall. Reaches 10–15 ft, twining habit. Hardy zone
          4–9, full sun (tolerates part shade with reduced bloom).
          Non-invasive (unlike Japanese honeysuckle / L. japonica).
        site_fit: |
          South-facing pergola exposure handles the heat well. Wind on
          the mountainside isn't a problem once the vine is established
          and tied in — twining stems are flexible and the pergola
          anchors the foliage. Deer-tolerant but not bulletproof; rate
          of browse here should be lower since deer pressure in this
          area is rated low (same as the magnolia's rating).
        establishment_care: |
          Plant 12–18" out from the pergola post, lean toward the
          structure, tie loosely to start it climbing. Mulch 2–3" deep,
          keep off the crown. Deep weekly watering year 1. Prune lightly
          in early spring (after worst freezes) to shape and remove
          deadwood — blooms on new wood so spring pruning won't sacrifice
          flowers. Fertilize lightly in spring once established.
        status: needs sourcing — not in current Diller/Stauffer's catalogs

      # Narrow columnar evergreen windbreak for the pergola vine
      - name: Cephalotaxus harringtonia 'Fastigiata'
        common_name: Japanese Plum Yew (columnar)
        quantity: 2
        source: Diller
        target_size: "#3 container, $38.50 (catalog id 81)"
        role: |
          Narrow upright evergreen windbreak for the pergola vine.
          Fastigiate (strictly columnar) form, 8 ft × 3 ft mature — tops
          out under the 10–15 ft Magnolia 'Jane' so it doesn't compete
          visually. Deer-bulletproof (cephalotaxus is the standard yew
          alternative). Shade-tolerant, which matters for the spot tucked
          between the house and the magnolia.
        site_fit: |
          Plant on the windward side of the pergola (NW for central PA
          prevailing winter wind) to shelter the lower 4–5 ft of the
          climbing vine. An 8 ft windbreak only protects ~4–5 ft of still
          air above its top, so the upper pergola canopy stays exposed —
          relevant when choosing the vine (group-3 clematis cut to 12"
          each spring or new-wood bloomers tolerate this; old-wood
          bloomers like C. montana don't).
        establishment_care: |
          Slow grower — expect 4–5 years from #3 container to functional
          windbreak height. Water deeply weekly year 1, monthly after
          establishment. No pruning needed to maintain narrow form.
        status: pending Diller stock check (2026-05-03)


# Landscaping plan — central PA mountainside, USDA zone 6b–7a.
#
# Each area has site conditions and a plant list. Plants are tagged with their
# source (Diller catalog vs find-elsewhere) so we know what to order from where.
# Quantities are the maximalist starting point — we'll trim as plants mature.
#
# When this list firms up across all areas, a sync script will load it into
# the SQLite DB (areas + plan_items tables) and the React app will render it
# read-only as a planning view.

areas:
  - name: Front foundation corner
    approx_sqft: 64                   # ~8x8 ft, possibly slightly larger
    sun: full shade                   # bright open shade — no direct sun, but bright reflected light
    exposure: |
      North-facing front-of-house corner. Sheltered by the house from the
      mountain wind (low wind exposure regardless of plant ratings).
      Bright afternoon sun passes by but never lands directly. High indirect
      light all day — ideal "bright open shade" conditions.
    deer_pressure: minimal             # right by front door; deer haven't been observed here
    theme: layered shade with year-round interest
    notes: |
      Visible from front door year-round, so winter interest matters.
      Bloom calendar: Hellebores Feb–Apr, Pulmonaria/Tiarella/Dicentra
      Mar–May, Astilbe + Hosta Jun–Jul, Hydrangea + Hosta Jul–Aug,
      Bugbane + Mahonia + Hakonechloa fall color Aug–Oct, Mahonia
      yellow blooms Feb. Something visible every month.

    plants:
      # Anchors (back of corner)
      - name: Cephalotaxus harringtonia 'Duke Garden'
        common_name: Japanese Plum Yew
        quantity: 1
        source: Diller
        role: Evergreen needled anchor shrub, ~7.5 ft mature, deer-resistant, wind-rated high

      - name: Mahonia x media 'Winter Sun'
        common_name: Mahonia
        quantity: 1
        source: Diller
        role: Second anchor — evergreen holly-like leaves with bright yellow Feb–Mar blooms

      # Mid-layer flowering shrub
      - name: Hydrangea arborescens 'Annabelle'
        common_name: Smooth Hydrangea
        quantity: 1
        source: Diller
        role: White snowball blooms June–September, shade-tolerant, ~4 ft, blooms on new wood

      # Mid-layer evergreen perennial
      - name: Helleborus orientalis 'Ivory Prince'
        common_name: Lenten Rose
        quantity: 3
        source: Diller
        role: Evergreen perennial, late winter / early spring blooms, deer-resistant

      # Spring ephemeral
      - name: Dicentra spectabilis
        common_name: Old-Fashioned Bleeding Heart
        quantity: 1
        source: Diller
        role: Pink heart-shaped spring blooms, dies back midsummer

      # Early-summer plumes
      - name: Astilbe 'Deutschland'
        common_name: Astilbe (white)
        quantity: 3
        source: Diller
        role: Feathery white plumes June–July, ferny foliage all season

      # Bold foliage statement
      - name: Hosta 'Sum and Substance'
        common_name: Giant Chartreuse Hosta
        quantity: 1
        source: Find elsewhere    # Bluestone Perennials, local nursery
        role: Statement large hosta, ~4 ft wide chartreuse foliage; deer-vulnerable but unlikely here

      - name: Hosta 'Patriot'
        common_name: Variegated Hosta
        quantity: 2
        source: Find elsewhere
        role: Mid-size variegated white-edge, brightens corner

      # Foliage palette (orange/burgundy via Heuchera)
      - name: Heuchera 'Caramel'
        common_name: Coral Bells (caramel)
        quantity: 1
        source: Diller
        role: Caramel-orange foliage; deer-resistant alternative palette

      - name: Heuchera 'Palace Purple'
        common_name: Coral Bells (burgundy)
        quantity: 1
        source: Diller
        role: Burgundy foliage all season

      # Silver foliage / spring color
      - name: Pulmonaria 'Mrs. Moon'
        common_name: Lungwort
        quantity: 3
        source: Find elsewhere    # Bluestone Perennials
        role: Silver-spotted leaves all season, pink-to-blue spring blooms

      # Fall grass
      - name: Hakonechloa macra 'Aureola'
        common_name: Japanese Forest Grass
        quantity: 3
        source: Diller
        role: Chartreuse arching grass; pink-copper fall color; needs bright indirect light to keep color

      # Late-summer vertical accent
      - name: Actaea racemosa
        common_name: Black Cohosh / Bugbane
        quantity: 1
        source: Find elsewhere    # PA native nursery (Bowman's Hill) or Bluestone
        role: PA native, 4–6 ft white spires August–September

      # Sept-Oct bloom
      - name: Tricyrtis hirta
        common_name: Toad Lily
        quantity: 2
        source: Find elsewhere
        role: Orchid-like spotted purple blooms September–October

      # Native ground cover
      - name: Tiarella cordifolia
        common_name: Foamflower
        quantity: 5
        source: Find elsewhere    # PA native nursery (Bowman's Hill) preferred
        role: PA native, white foamy spring spikes, red-bronze fall foliage, slowly spreading

      # Fragrant ground cover
      - name: Galium odoratum
        common_name: Sweet Woodruff
        quantity: 3
        source: Diller
        role: Full-shade ground cover; fragrant white May flowers; complements Tiarella texturally

    # Total: 32 plants in 64 sqft. Maximalist density — trim as plants establish.
    # Trim-first candidates if too dense after season 1:
    #   - Drop one of the Heucheras (role covered by hostas + pulmonaria)
    #   - Pulmonaria 3 → 2
    #   - Tiarella 5 → 4 (they spread, gaps fill naturally)

  - name: Driveway shade
    sun: full sun
    exposure: |
      Open driveway alongside / edge planting. Goal is to shade the driveway
      surface to keep asphalt cooler and the area more comfortable.
      Mountainside wind exposure (deep tap roots required so the tree anchors
      well; no surface-rooted species near the driveway pavement).
    notes: |
      Two-tree staggered approach being considered:
        1. Plant the 2-2.5" cal Honeylocust 'Skyline' from Diller THIS WEEK
           (late April 2026 — tail end of spring B&B window, but Honeylocust
           leafs out late so it's still effectively dormant; planting now is
           viable with aggressive watering through summer).
        2. Optionally pair with a 4-5" cal Honeylocust from a central-PA
           landscape contractor (Black Landscape Center, Stauffer's of Kissel
           Hill, or via Bartlett/Davey wholesale) installed in FALL 2026 —
           the optimal window for large B&B. Budget ~$2500-3500 installed.
      This area's full plant list is still being designed — committed now
      so the Honeylocust acquisition isn't held up.

    plants:
      - name: Gleditsia triacanthos inermis 'Skyline'
        common_name: Honeylocust (thornless)
        quantity: 1
        source: Diller
        target_size: 2-2.5" caliper (~10-11 ft tall, $194)
        role: |
          Primary driveway shade tree. Rapid grower, deep tap root (won't
          buckle pavement), tiny pinnate leaflets that don't need raking,
          high wind tolerance for the mountainside, filtered dappled shade.
          Plant 15-20 ft off driveway edge. Stake (mountainside wind),
          mulch ring, soaker hose for first season.
        status: planning to acquire late April 2026

      # TODO — fall 2026 contractor specimen:
      # - name: Gleditsia triacanthos inermis 'Skyline' (4-5" cal specimen)
      #   quantity: 1
      #   source: Black Landscape Center / contractor (B&B from regional wholesaler)
      #   target_size: 4-5" caliper (~17-20 ft tall, ~$2500-3500 installed)
      #   role: Pair with Diller-sized tree for shade-now + shade-later staggering.
      #   timing: install Sept-Nov 2026 (optimal large-B&B window)

  - name: Driveway entrance corner (mirrored)
    approx_sqft: 20                     # 4 ft × 5 ft each
    multiplier: 2                       # mirrored on both sides of entrance
    sun: full sun
    exposure: |
      Roadside corner planting at the driveway entrance. Open mountainside
      with no overhead canopy. NO water access — these have to live on
      rainfall alone after year 1. Drought-bombproof palette only. Mountain
      wind exposure (the Spiraea anchor and Lavender are wind-tough).
      Mirrored on both sides of the entrance for visual symmetry.
    notes: |
      Bloom calendar: Mar-Apr Daffodils → Apr-May Dianthus → May-Jul
      Lavender + Allium → Jun-Sep Echinacea → Sep-Oct Sedum → winter
      structural Spiraea + Lavender semi-evergreen + Sedum dried heads.
      See plan_layouts/corner_layout.png for top-down spatial diagram.

    plants:
      # Back row (toward road, 1.5-2 ft tall)
      - name: Spiraea japonica 'Goldmound'
        common_name: Spiraea
        quantity: 1
        source: Diller
        role: Back-center anchor; gold foliage Apr-Oct, pink flowers Jul

      - name: Lavandula angustifolia 'Munstead'
        common_name: English Lavender
        quantity: 2
        source: Diller
        role: Back-flanking the anchor; purple Jun-Jul, semi-evergreen blue-grey winter foliage

      # Mid row (1-1.5 ft tall)
      - name: Echinacea purpurea 'Pow Wow White'
        common_name: White Coneflower
        quantity: 2
        source: Diller
        role: Mid-row drift; PA native, Jun-Sep blooms, drought-tolerant

      - name: Sedum 'Autumn Joy'
        common_name: Autumn Stonecrop
        quantity: 3
        source: Diller
        role: Mid-front cluster; pink Sep-Oct + dried winter heads; indestructible

      # Front edge (6 in tall)
      - name: Dianthus 'Firewitch'
        common_name: Cheddar Pinks
        quantity: 3
        source: Diller
        role: Front edge mat; pink Apr-May, blue-grey foliage year-round

      # Bulbs (fall plant for next spring)
      - name: Allium 'Purple Sensation'
        common_name: Ornamental Onion
        quantity: 5
        source: Find elsewhere    # mail-order bulb supplier (Brent and Becky's, Van Engelen, etc.)
        role: Vertical accent — 2 ft purple drumsticks May-Jun; interplant in mid-row pockets between Sedums
        timing: plant fall 2026 for spring 2027 bloom

      - name: Narcissus 'Tête-à-Tête'
        common_name: Mini Daffodil
        quantity: 12
        source: Find elsewhere
        role: Earliest spring color — 6 in yellow Mar-Apr; deer-proof; interplant in front-edge pockets between Dianthus
        timing: plant fall 2026

    # Per corner: 11 perennials + 17 bulbs. ×2 (mirrored) = 22 perennials + 34 bulbs total.

  - name: Driveway top bed
    approx_sqft: 70                     # 14 ft × 5 ft
    sun: full sun
    exposure: |
      Linear bed at the top of the driveway. Open mountainside with no
      overhead shade. Drip irrigation possible (run a hose loop along the
      back) — used as backup during drought, not life support. Plants
      still skewed drought-tolerant as the dominant strategy.
    notes: |
      Bloom calendar: Mar-May Daffodils + Dianthus → May-Jul Lavender +
      Salvia + Allium → Jun-Aug Veronica + Liatris + Echinacea + Coreopsis
      + Geranium → Jul-Oct Rudbeckia + Liatris → Aug-Sep Liriope spikes →
      Sep-Oct Sedum + Heuchera burgundy → winter Spiraea structure +
      Sedum dried heads + Liriope evergreen + Heuchera + Lavender semi-
      evergreen. Year-round.
      See plan_layouts/top_layout.png for top-down spatial diagram.

    plants:
      # Back row (toward house, 2-3 ft tall)
      - name: Spiraea japonica 'Goldmound'
        common_name: Spiraea
        quantity: 1
        source: Diller
        role: Back-center anchor; gold foliage + pink Jul flowers

      - name: Lavandula angustifolia 'Phenomenal'
        common_name: Phenomenal Lavender
        quantity: 3
        source: Diller
        role: Back-row drift; heat-tolerant cultivar, purple Jun-Jul

      - name: Veronica spicata 'Royal Candles'
        common_name: Spike Speedwell
        quantity: 3
        source: Diller
        role: Back-row vertical accents; blue spikes Jun-Aug

      # Mid row (~2 ft tall, summer flower mass)
      - name: Echinacea purpurea 'Cheyenne Spirit'
        common_name: Coneflower (mixed colors)
        quantity: 5
        source: Diller
        role: Mid-row mass; PA native, multicolor blooms Jun-Sep

      - name: Liatris spicata 'Kobold'
        common_name: Blazing Star
        quantity: 5
        source: Diller
        role: Vertical purple spikes Jul-Aug; PA native, pollinator magnet

      - name: Salvia x sylvestris 'May Night'
        common_name: May Night Salvia
        quantity: 3
        source: Diller
        role: Deep purple May-Jun + rebloom Aug; deer-resistant

      # Mid-front (1-1.5 ft tall, golden / sedum band)
      - name: Coreopsis verticillata 'Moonbeam'
        common_name: Threadleaf Coreopsis
        quantity: 5
        source: Diller
        role: Yellow Jun-Sep; ferny foliage; drought-tolerant

      - name: Rudbeckia fulgida 'Goldsturm'
        common_name: Black-Eyed Susan
        quantity: 5
        source: Diller
        role: Golden Jul-Oct; PA native; long bloom

      - name: Sedum 'Autumn Joy'
        common_name: Autumn Stonecrop
        quantity: 5
        source: Diller
        role: Mid-front clusters; pink Sep + winter dried heads

      - name: Geranium 'Rozanne'
        common_name: Cranesbill
        quantity: 3
        source: Diller
        role: Long-blooming purple May-Oct; sprawling 2 ft spread

      # Front edge (6 in - 1.5 ft)
      - name: Dianthus 'Firewitch'
        common_name: Cheddar Pinks
        quantity: 3
        source: Diller
        role: Front edge mat; pink Apr-May, blue-grey foliage year-round

      - name: Heuchera 'Palace Purple'
        common_name: Coral Bells (burgundy)
        quantity: 3
        source: Diller
        role: Burgundy foliage all season

      - name: Liriope muscari
        common_name: Lily Turf
        quantity: 5
        source: Diller
        role: Front-edge clumps; evergreen strap foliage + Aug-Sep purple spikes
        notes: Confirm with Diller this is L. muscari (clumping) NOT L. spicata (spreading invasive)

      # Bulbs (fall plant for next spring)
      - name: Narcissus mixed (early/mid/late season)
        common_name: Daffodils
        quantity: 30
        source: Find elsewhere    # mail-order bulb supplier
        role: Mar-May progression of spring color; deer-proof; interplant throughout
        timing: plant fall 2026

      - name: Allium 'Purple Sensation'
        common_name: Ornamental Onion
        quantity: 12
        source: Find elsewhere
        role: 2 ft purple drumsticks May-Jun; interplant in mid-row pockets
        timing: plant fall 2026

    # Total: 49 perennials + 42 bulbs. Designed at maximalist density to be
    # trimmed as plants establish over 2-3 seasons.

    plants:
      - name: Hydrangea anomala subsp. petiolaris
        common_name: Climbing Hydrangea
        quantity: 1
        source: Diller                # carried as HYDRANGEA petiolaris in catalog
        role: |
          Self-clinging climbing vine via aerial rootlets — attaches
          directly to walls, posts, or tree trunks without trellising.
          White lacecap flower clusters in early summer; rich green
          heart-shaped foliage; cinnamon-brown peeling bark for winter
          interest. Reaches 30–50 ft on a tall support, but easily kept
          smaller. Ideal sun exposure is morning sun + afternoon shade.
        site_fit: |
          Morning-sun + afternoon-shade exposure is the textbook spot for
          this plant — full afternoon sun on a hot wall would scorch the
          foliage. Consistent moisture is required; mulch heavily and
          plan for deep weekly watering through year 1–2. Slow to
          establish ("sleep, creep, leap") — first reliable bloom often
          year 3–5, but the plant is very long-lived once settled.
        establishment_care: |
          Plant 12" out from the support surface. Mulch 3" deep, 3 ft
          ring, kept off the crown. Deep weekly watering year 1 and 2.
          No pruning needed except shaping; if pruning, do it right
          after bloom (blooms on old wood — pruning in spring or fall
          sacrifices the next year's flowers).
        status: TBD — confirm site exposure and support surface before ordering

      - name: Campanula 'Blue Waterfall'
        common_name: Serbian Bellflower (Blue Waterfall)
        quantity: 5
        source: Diller                # #1 container, $7.50
        role: |
          Low spreading evergreen perennial groundcover, ~8" tall × 3 ft
          wide. Cascading habit covered in star-shaped lavender-blue
          flowers late spring into summer, with sporadic rebloom. Fills
          in around the base of the climbing hydrangea and softens the
          paver edge. Deer- and rabbit-resistant.
        site_fit: |
          Dappled / morning-sun + afternoon-shade exposure matches the
          area's working hypothesis exactly — same sweet spot as the
          climbing hydrangea above it. Tolerates the mountainside wind
          (low ground-hugging profile). Hardy zone 3–8, well within
          range. Low water needs once established; pairs well with the
          hydrangea's deeper-water regime since the Campanula sits at
          the mulch line and benefits from the same irrigation.
        establishment_care: |
          Space 24–30" o.c. for the 5 plants — they will knit together
          in 1–2 seasons. Plant outside the hydrangea's 3 ft mulch ring
          so they don't compete at the crown. Water deeply weekly through
          year 1; drought-tolerant from year 2. Shear lightly after the
          main spring flush to encourage rebloom and tidy the cascade.
        status: ready to order — Diller in stock

      # Mid-layer spring focal — added 2026-05-03
      - name: Dicentra spectabilis
        common_name: Old-Fashioned Bleeding Heart
        quantity: 5
        source: Diller
        target_size: "$9 ea ($45 total) — Diller"
        role: |
          Mid-layer perennial, 24–36" tall × 18–24" wide. Arching
          racemes of pink-and-white heart-shaped flowers April–June
          (classic spring cottage-garden silhouette). Ferny blue-green
          foliage. Fills the vertical gap between the climbing
          hydrangea above and the Campanula 'Blue Waterfall' edge
          below — shares the same sun brief as both.
        site_fit: |
          Morning sun + afternoon shade is the textbook condition for
          Dicentra. Wants consistent moisture and rich soil; benefits
          from the same irrigation regime as the hydrangea. Deer-
          resistant (Rutgers B — isoquinoline alkaloids deter browsing).
        seasonal_note: |
          Goes dormant by mid-summer in hot weather — foliage yellows
          and dies back, leaving 5 bare spots in the bed Jul–frost.
          Campanula edge stays evergreen and hydrangea carries vertical
          mass, so the bed doesn't go fully bare, but the mid-layer
          empties. Could be paired with later-emerging shade perennials
          (Astilbe, Hosta, Brunnera) to fill the dormancy gap;
          deliberately not adding more here yet — confirm bed footprint
          on site walk first.
        establishment_care: |
          Space 24–36" o.c. for the 5 plants. Plant in spring or fall
          while dormant for best transplant success. Water deeply weekly
          through year 1; drought-tolerant from year 2 once roots
          establish. Don't cut foliage until fully yellow — plant is
          still photosynthesizing into early summer.
        status: ready to order — Diller in stock

      # Summer/fall drift — fills the Dicentra dormancy gap (Jul–frost)
      - name: Rudbeckia fulgida 'Goldsturm'
        common_name: Black-Eyed Susan (PA-region native)
        quantity: 5
        source: Diller                # #1 container, $6.50 ($32.50 total)
        role: |
          Mid-layer summer/fall perennial, ~22" tall × 3 ft wide. Gold
          ray flowers with black cones July–October — exactly when the
          Dicentra goes dormant, so this drift fills the bare mid-layer
          for the back half of the season. Sturdy stems, prairie-native
          wind tolerance, deer-resistant.
        site_fit: |
          ⚠️ Sun mismatch flag — Rudbeckia 'Goldsturm' wants full sun
          (6+ hrs) for best bloom. Upper paver's working hypothesis is
          morning sun + afternoon shade (~4 hrs direct), which is
          part-sun. The plant will grow and flower here, but bloom
          density will be reduced vs. a full-sun site. Worth the trade
          to fill the Dicentra dormancy gap, but CONFIRM the actual
          morning-sun hours on the on-site walk before ordering — if
          the spot turns out to be heavily shaded all day, re-home to
          a sunnier area (sp5 driveway top, sp7 pathway-to-paver, or
          sp3 driveway corners). Hardy zone 3–9; high deer resistance
          matches the area brief.
        establishment_care: |
          Space 18–24" o.c. for the 5 plants — they will form a
          continuous drift in 1–2 seasons. Plant in spring; water
          deeply weekly through year 1, then drought-tolerant. Cut
          back to basal foliage in late fall or leave seedheads
          standing for winter interest and finch food (then cut in
          early spring). Divide every 3–4 years to maintain vigor.
        status: ready to order — Diller in stock (verify sun on site walk first)


  - name: Driveway lamp post bed
    slug: sp4_full_sun_driveway_lamp
    approx_sqft: 70
    sun: full sun                      # house-shaded until ~10:30am, then direct sun through afternoon (~6–7 hrs)
    exposure: |
      Bed around the driveway lamp post. House casts shade until
      ~10:30am, after which the bed gets direct sun through the rest
      of the day. Effectively full sun.
    deer_pressure: high                # active browsing — existing hydrangea is being eaten
    theme: deer-resistant — Phase 1 starts with a Geranium 'Rozanne' perimeter ribbon
    notes: |
      Existing hydrangea in this bed is being browsed by deer. Phase 1
      strategy: surround it with deer-resistant aromatics and a low
      perimeter ribbon to make the bed less inviting to walk into.
      Starting with a full perimeter of Geranium 'Rozanne' (deer-skip,
      May–frost bloom, sprawling habit) at 24" o.c. — Rozanne reaches
      30"+ wide, so anything tighter tangles. Confirm bed shape on
      site walk; quantity assumes ~34 linear ft of perimeter.

      Inner-bed deer-deterrent layer (Phase 2, TBD): Stauffer's
      candidates flagged include Salvia 'Violet Profusion', Achillea
      'Strawberry Seduction', and Buddleia 'Miss Violet' as a
      companion shrub anchor. Optionally Clematis 'Niobe' climbing
      the lamp post itself.

    plants:
      # Phase 1 — perimeter ribbon
      - name: Geranium 'Rozanne'
        common_name: Rozanne Hardy Geranium / Cranesbill
        quantity: 18
        source: Diller
        target_size: "#1 container, $9 ea"
        role: |
          Deer-resistant perimeter ribbon. Violet-blue saucer flowers
          May through frost (one of the longest-blooming perennials
          in cultivation), 18" tall × 30"+ sprawl, full sun, hardy
          zone 5–8. Spaced at 24" o.c. around the ~34 ft perimeter of
          the 70 sqft bed. Forms a continuous low ring that deer
          generally walk around rather than into.
        timing: spring planting; cut back hard mid-summer if foliage flops

      # Focal flowering shrub — yellow-orange spring bloom
      - name: Rhododendron 'Capistrano'
        common_name: Capistrano Rhododendron
        quantity: 1
        source: Stauffer's
        target_size: "#3 container, $39.99"
        role: |
          Focal anchor inside the Geranium ring — pale yellow blooms
          (buds open peach, fade to soft yellow) in May. Matures
          ~4–5 ft × 4–5 ft, evergreen, prefers acidic well-drained
          soil. Deer caveat: rhodos are only moderately deer-tolerant,
          not deer-proof — siting it inside the Geranium 'Rozanne'
          perimeter ribbon reduces casual browsing, but expect some
          winter sampling in heavy-pressure years. Pair with bone
          meal at planting and keep mulched to maintain the acid
          soil it wants.

      # Mid-bed white coneflowers — pollinator + deer-resistant accent
      - name: Echinacea 'Pow Wow White'
        common_name: Pow Wow White Coneflower
        quantity: 3
        source: Diller
        target_size: "#1 container, $6.50–7.50 ea"
        role: |
          Compact white coneflower, 18–24" tall × 16–20" wide. White
          petals with golden cone, June through September, very long
          bloom. Reliably deer-resistant (Echinacea is one of the few
          flowering perennials deer truly avoid), drought-tolerant
          once established, pollinator and goldfinch magnet (leave
          seed heads through fall/winter for the birds). Cluster the
          3 plants together in a tight trio (~12–15" between centers)
          on the south/sunny side of the Capistrano rhodo — reads as a
          single mass against the rhodo's evergreen backdrop, white
          against pale yellow + violet-blue.

      # Inner-bed groundcover — replaced Dragon's Blood 2026-05-03
      - name: Cotoneaster dammeri 'Coral Beauty'
        common_name: Bearberry Cotoneaster
        quantity: 3
        source: Diller
        target_size: "#2 container, $23 ea ($69 total) — or #3 at $30 ea ($90 total)"
        role: |
          Low spreading woody groundcover, 1 ft tall × 3 ft spread per
          plant. Forms a dense glossy-green mat at the inner-bed floor.
          White apple-blossom-style flowers in spring; coral-red
          berries late summer through early winter (the cultivar's
          namesake, hence the name); semi-evergreen foliage with bronze
          winter tints. Bird-friendly — robins and waxwings strip the
          berries through December.
        site_fit: |
          Inner-bed groundcover. 3 plants at 3-ft spread cover ~25 sqft
          of open inner-bed ground (after rhodo, hydrangea, Buddleia,
          Echinacea, and perimeter Geranium ribbon footprints). Adds
          the only 4-season element to the bed — every other plant
          goes dormant in winter; Cotoneaster carries the bed visually
          November through March with persistent foliage and berries.
        deer_note: |
          Catalog rates "high" deer resistance; Rutgers-scale equivalent
          is "B — Seldom Severely Damaged" (not bulletproof). Better-
          defended than the existing browsed hydrangea and the
          Capistrano rhodo. Low profile + waxy leaves help — deer
          prefer eye-height browse and tender new growth.
        establishment_care: |
          Slow first year ("sleep, creep, leap"). Plant 3 ft on-center;
          full coverage by year 2–3. Water deeply weekly through summer
          year 1; established plants are very drought-tolerant. Watch
          for fire blight (Erwinia amylovora) — moderately susceptible;
          if a branch turns black + shepherd's-crook, prune 12" below
          damage and disinfect tools.
        status: pending Diller stock check (2026-05-03)

      # Mid-shrub butterfly bush — purple bloom layer + pollinator anchor
      - name: Buddleia davidii 'Groovy Grape'
        common_name: Groovy Grape Butterfly Bush
        quantity: 1
        source: Diller
        target_size: "$31.50 (container TBD with Diller)"
        role: |
          Compact butterfly bush, ~2–3 ft × 2–3 ft mature (newer
          Proven Winners InSpired-series compact, smaller than classic
          B. davidii). Deep purple flower spikes June through frost,
          fragrant, butterfly + hummingbird magnet. Deer-resistant
          (Rutgers A–B). Reinforces the violet-blue note from the
          Geranium 'Rozanne' perimeter ring at a taller mid-shrub
          layer; pairs cleanly with the Capistrano's pale yellow May
          blooms (both visible together in early summer overlap) and
          the white Echinacea trio.
        site_fit: |
          Place at mid-bed beside or just behind the Capistrano rhodo,
          on a sunny side that won't be shaded by the rhodo's
          evergreen mass. Buddleia needs full sun and well-drained
          soil — it's drought-tolerant once established and dislikes
          wet feet. Hard prune to 12" each spring (blooms on new wood
          — same Group-3 schedule as the clematis idea earlier, so
          spring pruning is a natural rhythm for the bed).
        invasive_note: |
          Buddleia davidii is on the PA Invasive Plant List. 'Groovy
          Grape' is a newer compact cultivar (Proven Winners
          InSpired series) with reduced seed-set vs. classic B.
          davidii cultivars like 'Black Knight'; not as well-
          documented as the 'Pugster' or 'Miss' series for sterility,
          so deadhead spent flower spikes through summer to minimize
          any seed escape.
        status: pending Diller stock check (2026-05-03)


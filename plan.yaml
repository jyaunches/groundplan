# Landscaping plan — central PA mountainside, USDA zone 6b–7a.
#
# Each area has site conditions and a plant list. Plants are tagged with their
# source (Diller catalog vs find-elsewhere) so we know what to order from where.
# Quantities are the maximalist starting point — we'll trim as plants mature.
#
# Each area has a `slug` — a stable machine ID used to link the area to its
# photo directory under `areas_originals/<slug>/`. Slugs starting with `sp*`
# match the photographed beds; slugs without a `sp*` prefix (single-tree
# placements like the Honeylocust and Kousa) intentionally have no photo dir.
#
# When this list firms up across all areas, a sync script will load it into
# the SQLite DB (areas + plan_items tables) and the React app will render it
# read-only as a planning view.

areas:
  - name: Front foundation corner
    slug: sp1_shade_front_door
    approx_sqft: 64                   # ~8x8 ft, possibly slightly larger
    sun: part shade                   # mostly shaded; afternoon direct sun ~3pm onwards in summer; small fully-shaded pocket in the corner
    exposure: |
      North-facing front-of-house corner. Sheltered by the house from the
      mountain wind (low wind exposure regardless of plant ratings).
      Mostly shaded, but in summer the bed gets direct afternoon sun from
      ~3pm onwards (roughly 3–5 hours). A small pocket tucked into the
      corner stays in full shade all day.
    deer_pressure: minimal             # right by front door; deer haven't been observed here
    theme: simplified part-shade palette — culled after AI rendering review
    notes: |
      Plant list culled 2026-04-26 after AI-rendering review: kept Mahonia
      'Winter Sun', Helleborus 'Ivory Prince', Astilbe 'Deutschland',
      Pulmonaria 'Mrs. Moon', Galium odoratum. Removed the rest
      (Cephalotaxus, Dicentra, both Hostas, both Heucheras, Hakonechloa,
      Actaea, Tricyrtis, Tiarella). Hydrangea 'Annabelle' later swapped
      for Clethra 'Ruby Spice' (PA native, fragrant, pink). Front-edge
      border: Liriope muscari (clumping form — chosen over invasive-
      flagged L. spicata and over messier-looking native Carex
      pensylvanica). Then added Geum 'Totally Tangerine' (orange,
      May–Aug) and Anemone × hybrida 'Honorine Jobert' (white coneflower
      silhouette, Aug–Oct) to fill bloom gaps and extend season. Added
      Brunnera 'Jack Frost' for true-blue spring flowers + silver foliage
      (chosen over a blue hydrangea, which would have scorched in the
      afternoon sun). Clethra 'Ruby Spice' removed 2026-05-03 — bed now
      has no flowering shrub and no July–August bloomer; replacement TBD.

    plants:
      # Anchor — back of corner
      - name: Mahonia x media 'Winter Sun'
        common_name: Mahonia
        quantity: 1
        source: Diller
        role: Anchor — evergreen holly-like leaves with bright yellow Feb–Mar blooms

      # Coneflower-silhouette / fall extender
      - name: Anemone x hybrida 'Honorine Jobert'
        common_name: Japanese Anemone
        quantity: 2
        source: Find elsewhere    # mail-order (Bluestone, Plant Delights) — not in Diller catalog
        role: White daisy-form blooms with prominent yellow centers, ~3 ft airy stems, blooms late August through October — extends bed bloom calendar by ~6 weeks past everything else. Part shade, well-behaved clumping perennial. Provides the coneflower silhouette in fall when true Echinacea is done.

      # Mid-layer evergreen perennial
      - name: Helleborus orientalis 'Ivory Prince'
        common_name: Lenten Rose
        quantity: 3
        source: Diller
        role: Evergreen perennial, late winter / early spring blooms, deer-resistant

      # Early-summer plumes
      - name: Astilbe 'Deutschland'
        common_name: Astilbe (white)
        quantity: 3
        source: Diller
        role: Feathery white plumes June–July, ferny foliage all season

      # Silver foliage / spring color
      - name: Pulmonaria 'Mrs. Moon'
        common_name: Lungwort
        quantity: 3
        source: Find elsewhere    # Bluestone Perennials
        role: Silver-spotted leaves all season, pink-to-blue spring blooms

      # Blue spring color + silver foliage
      - name: Brunnera macrophylla 'Jack Frost'
        common_name: Siberian Bugloss / False Forget-Me-Not
        quantity: 3
        source: Find elsewhere    # mail-order (Bluestone, Plant Delights) — not in Diller catalog
        role: True sky-blue forget-me-not flowers April–May; silver-veined heart-shaped leaves all season. Brings blue into the bed (replaces the role a blue hydrangea would have played, but actually thrives in afternoon-sun part-shade). Pairs texturally with Pulmonaria — both silver-foliage but different leaf shapes.

      # Orange — long-blooming May-Aug
      - name: Geum 'Totally Tangerine'
        common_name: Avens
        quantity: 3
        source: Find elsewhere    # mail-order (Bluestone, Plant Delights) — not in Diller catalog
        role: Apricot-orange wiry-stemmed flowers May through August (~3 month bloom — sterile hybrid keeps pushing new spikes), 2 ft tall over scalloped basal foliage. Part shade tolerant. Fills the May–June bloom gap; brings orange into the palette. Mid-layer just behind the Liriope.

      # Fragrant ground cover
      - name: Galium odoratum
        common_name: Sweet Woodruff
        quantity: 3
        source: Diller
        role: Full-shade ground cover; fragrant white May flowers

      # Front-edge clumping border
      - name: Liriope muscari 'Big Blue'
        common_name: Lilyturf
        quantity: 10
        source: Diller    # carried under the LIRIOPE section (catalog OCR mis-filed under LIATRIS); 'Big Blue' ~$5.50, also has 'Royal Purple' and 'Variegated'
        role: |
          Front-edge border; clean upright grass-like blades, lilac flower
          spikes Aug–Sep, handles afternoon sun + shaded pocket equally,
          deer-resistant. Clumping habit (vs. spicata's running) — stays
          put, won't escape to woods. Not on PA invasive lists. ~10 plants
          at ~12" spacing along the front curving edge.

    # Total: 32 plants in 64 sqft (10 species). Comfortable density for the
    # part-shade conditions; bloom calendar now covers Feb through October.

  - name: Driveway shade
    slug: driveway_shade_tree         # single-tree placement — no photo dir
    sun: full sun
    exposure: |
      Open driveway alongside / edge planting. Goal is to shade the driveway
      surface to keep asphalt cooler and the area more comfortable.
      Mountainside wind exposure (deep tap roots required so the tree anchors
      well; no surface-rooted species near the driveway pavement).
    notes: |
      Two-tree staggered approach being considered:
        1. Plant the 2-2.5" cal Honeylocust 'Skyline' from Diller THIS WEEK
           (late April 2026 — tail end of spring B&B window, but Honeylocust
           leafs out late so it's still effectively dormant; planting now is
           viable with aggressive watering through summer).
        2. Optionally pair with a 4-5" cal Honeylocust from a central-PA
           landscape contractor (Black Landscape Center, Stauffer's of Kissel
           Hill, or via Bartlett/Davey wholesale) installed in FALL 2026 —
           the optimal window for large B&B. Budget ~$2500-3500 installed.
      This area's full plant list is still being designed — committed now
      so the Honeylocust acquisition isn't held up.

    plants:
      - name: Gleditsia triacanthos inermis 'Skyline'
        common_name: Honeylocust (thornless)
        quantity: 1
        source: Diller
        target_size: 2-2.5" caliper (~10-11 ft tall, $194)
        role: |
          Primary driveway shade tree. Rapid grower, deep tap root (won't
          buckle pavement), tiny pinnate leaflets that don't need raking,
          high wind tolerance for the mountainside, filtered dappled shade.
          Plant 15-20 ft off driveway edge. Stake (mountainside wind),
          mulch ring, soaker hose for first season.
        status: planning to acquire late April 2026

      # TODO — fall 2026 contractor specimen:
      # - name: Gleditsia triacanthos inermis 'Skyline' (4-5" cal specimen)
      #   quantity: 1
      #   source: Black Landscape Center / contractor (B&B from regional wholesaler)
      #   target_size: 4-5" caliper (~17-20 ft tall, ~$2500-3500 installed)
      #   role: Pair with Diller-sized tree for shade-now + shade-later staggering.
      #   timing: install Sept-Nov 2026 (optimal large-B&B window)

  - name: Hillside flowering tree
    slug: hillside_kousa              # single-tree placement — no photo dir
    sun: full sun                      # TODO confirm — assumed full sun, may be part sun if house casts a long shadow
    exposure: |
      Mountainside slope, planted a few feet above the bottom of the hill
      (not at the very bottom — sited up the slope for good drainage and
      to climb out of the cold-air pocket). House provides partial wind
      shelter; some winter wind exposure remains.
    deer_pressure: moderate            # mountainside; kousa rated high deer-resistance
    theme: spring/summer flowering tree with year-round interest
    notes: |
      Site prep on a slope: level the planting hole into a small shelf,
      build a low berm on the downhill side so water soaks the rootball
      instead of running off. Mulch 3 in deep out to the dripline — kousa
      is shallow-rooted and a slope dries faster than flat ground.
      Color calendar: May-Jun green-aging-to-white bracts (4-6 weeks) →
      Jul glossy green leaves → Aug-Sep pink-red strawberry-like fruits →
      Oct scarlet-burgundy fall color → winter mottled exfoliating bark
      + tiered horizontal branching.

    plants:
      - name: Cornus kousa 'Celestial'
        common_name: Kousa Dogwood (Stellar series)
        quantity: 1
        source: Diller
        target_size: 2.5-3" caliper (~10-12 ft tall, $187 — id 167)
        alternatives:
          - "6-7 ft B&B (id 170, $117) — value option, adds ~2 yrs to 'shade + flowers' timeline"
          - "5-6 ft container (id 169, $92) — cheapest entry, adds ~3 yrs"
        role: |
          Hillside flowering tree. Heavy-blooming Stellar-series hybrid
          (kousa × florida, Rutgers); white pointed bracts held upward
          on tiered branches May-Jun, hold 4-6 weeks. Pink-red
          raspberry-like fruits Aug-Sep (birds love them). Reliable
          scarlet-burgundy fall color. Mottled exfoliating bark develops
          after ~10 yrs for winter interest. Slow grower (12-18 in/yr);
          2.5-3" cal start gets meaningful shade in 2-3 seasons.
        status: planning to acquire 2026

  - name: Driveway entrance corner (mirrored)
    slug: sp3_full_sun_driveway_sides
    approx_sqft: 20                     # 4 ft × 5 ft each
    multiplier: 2                       # mirrored on both sides of entrance
    sun: full sun
    exposure: |
      Roadside corner planting at the driveway entrance. Open mountainside
      with no overhead canopy. NO water access — these have to live on
      rainfall alone after year 1. Drought-bombproof palette only.
      Mountain wind exposure. Mirrored on both sides of the entrance.
    palette_intent: |
      Lavender (only purple), apricot, white, yellow, with chartreuse
      groundcover at the front edge. Less pink than original draft.
    notes: |
      Bloom calendar: Mar-Apr Daffodils → May Lavender opens + white Allium
      → Jun-Sep Achillea apricot + Echinacea white + Lavender continues →
      Sep-Oct Sedum 'Autumn Joy' coral fall accent → winter Spiraea
      structure + Lavender semi-evergreen + Sedum dried heads + Sedum
      'Angelina' chartreuse evergreen mat. See plan_layouts/corner_layout.png.

    plants:
      # Back row (toward road, 1.5-2.5 ft tall)
      - name: Spiraea japonica 'Goldmound'
        common_name: Spiraea
        quantity: 1
        source: Diller
        status: planned
        role: Back-center anchor; gold foliage Apr-Oct

      - name: Lavandula angustifolia 'Munstead'
        common_name: English Lavender
        quantity: 2
        source: Diller
        status: planned
        role: Back-flanking the anchor; the only purple in the design; semi-evergreen blue-grey winter foliage

      - name: Achillea 'Apricot Delight'
        common_name: Yarrow (apricot)
        quantity: 2
        source: Bluestone Perennials (mail-order) — also try Stauffer's of Kissel Hill on arrival
        status: tentative
        alternatives:
          - "Achillea 'Terracotta' (peach-rust tone)"
          - "Achillea 'Strawberry Seduction' (red-orange) — slightly warmer"
          - "Agastache 'Apricot Sunrise' (different form, similar color)"
        role: Apricot-peach Jun-Sep, ferny silver-grey foliage; drought-bombproof

      # Mid row (1.5 ft tall)
      - name: Echinacea purpurea 'Pow Wow White'
        common_name: White Coneflower
        quantity: 2
        source: Diller
        status: planned
        role: Mid-row drift; PA native, Jun-Sep blooms

      - name: Sedum 'Autumn Joy'
        common_name: Autumn Stonecrop
        quantity: 2                     # reduced from 3 to dial back coral-pink
        source: Diller
        status: planned
        role: Coral-rust Sep-Oct + winter dried heads

      # Front edge (chartreuse groundcover)
      - name: Sedum 'Angelina'
        common_name: Stonecrop (chartreuse)
        quantity: 3
        source: Diller
        status: planned
        role: Front-edge succulent mat; chartreuse-gold foliage year-round, low (4-6 in)

      # Bulbs (fall plant for next spring)
      - name: Allium 'Mount Everest'
        common_name: White Giant Allium
        quantity: 5
        source: Brent and Becky's Bulbs / Van Engelen (mail-order)
        status: tentative
        alternatives:
          - "Allium 'Mount Everest' is the primary — 3-4 ft white drumsticks"
          - "Allium 'White Giant' (different cultivar, similar look)"
          - "Allium nigrum (white star-shaped clusters)"
        role: White vertical accents May-Jun (replaces purple 'Purple Sensation' from earlier draft); interplant in mid-row pockets
        timing: plant fall 2026 for spring 2027 bloom

      - name: Narcissus 'Tête-à-Tête'
        common_name: Mini Daffodil
        quantity: 12
        source: Brent and Becky's Bulbs (mail-order)
        status: tentative
        alternatives:
          - "Narcissus 'February Gold' (slightly larger, earliest)"
          - "Mixed mini-daffodil collection (any of several yellow cvs)"
        role: Earliest spring color — 6 in yellow Mar-Apr; deer-proof
        timing: plant fall 2026

    # Per corner: 12 perennials + 17 bulbs. ×2 (mirrored) = 24 perennials + 34 bulbs total.

  # ↓ TOP BED — see below

  - name: Driveway top bed
    slug: sp5_full_sun_driveway_top
    approx_sqft: 70                     # 14 ft × 5 ft
    sun: full sun
    exposure: |
      Linear bed at the top of the driveway. Open mountainside with no
      overhead shade. Drip irrigation now more important than in the
      prior drought-bombproof design — daylilies require consistent
      moisture (more than Baptisia/Asclepias did). Run a hose loop
      along the back; daylilies and salvia want regular weekly water
      through summer.
    deer_pressure: high                  # mountainside; daylilies are deer candy (Rutgers D)
    palette_intent: |
      Purple + white + soft pink-cream (overhauled 2026-05-03 — see
      notes; daylily cultivars revised 2026-05-03 from the original
      pure-white-and-deep-purple intent to softer pastels). Three
      layers: deep-purple Buddleia 'Groovy Grape' butterfly bushes at
      back; pink-cream daylilies (Chosen Love + Lullaby Baby, mail-
      order from Oakes) in the middle; matched-pair 'Profusion' salvia
      (white + violet from Stauffer's) along the front as olfactory
      deer deterrent. Echinacea 'Pow Wow White' adds a second deer-
      resistant white mass. Sedum 'Angelina' kept as front-edge
      chartreuse mat for year-round coverage. White Allium 'Mount
      Everest' kept as palette-matched May–Jun bulb accent.
    notes: |
      OVERHAUL 2026-05-03 — full bed redesign from the prior maximalist
      drought-bombproof pollinator showcase to a purple + white
      minimalist focused on daylilies. Removed 13 cultivars (~45
      plants); see "Removed in 2026-05-03 overhaul" comment block
      after the area for the full list. Three of those were PA
      natives (Baptisia, Asclepias, Rudbeckia) — they could be
      re-homed to other areas (Garrett property line is a natural
      candidate for the deer-resistant natives) rather than dropped
      entirely; flagged for follow-up.

      Bloom calendar of new design: Mar–May Daffodils → May–Jun white
      Allium 'Mount Everest' + early Salvia 'Profusion' spikes → Jun–
      Aug daylilies + Buddleia + Echinacea + ongoing Salvia → Aug–
      frost Buddleia + Echinacea (re-bloom if deadheaded) → winter
      Sedum 'Angelina' chartreuse mat (the only winter color in the
      bed; ~50% structural drop vs. prior design).

      Deer strategy: daylilies are highly browsed (Rutgers D —
      Frequently Severely Damaged). Salvia 'Profusion' matched pair
      forms an aromatic olfactory wall along the front; Echinacea adds
      a second deer-resistant white mass behind the Salvia. Even with
      this companion-planting strategy, expect 30–40% daylily bud loss
      in heavy-pressure years; active spray (Liquid Fence on a 2-week
      rotation during bud formation, May–Jul) closes the gap.

      See plan_layouts/top_layout.png for the prior layout diagram —
      needs to be redrawn for the new design.

    plants:
      # Back row — 3 butterfly bushes spaced ~4-5 ft along the 14 ft back edge
      - name: Buddleia davidii 'Groovy Grape'
        common_name: Groovy Grape Butterfly Bush
        quantity: 3
        source: Diller
        target_size: "$31.50 ea ($94.50 total) — Diller (container TBD)"
        role: |
          Back-row anchor — three deep-purple butterfly bushes spaced
          ~4–5 ft apart along the 14 ft back edge. Compact 2–3 ft × 2–3 ft
          (Proven Winners InSpired-series). Fragrant butterfly + hummingbird
          magnet, blooms June through frost. Deer-resistant (Rutgers A–B).
          Hard prune to 12" each spring (blooms on new wood).
        invasive_note: |
          B. davidii is on the PA Invasive Plant List. 'Groovy Grape' is
          a newer compact cultivar with reduced seed-set; deadhead spent
          spikes through summer to minimize escape.
        status: pending Diller stock check (2026-05-03)

      # Middle row — pink-cream daylilies, ~24-30" o.c. across the bed
      - name: Hemerocallis 'Chosen Love'
        common_name: Chosen Love Daylily (pink with yellow throat)
        quantity: 3
        source: Oakes Daylilies (mail-order)
        target_size: "$54 for 3 (Oakes quantity-discount price, 2026-05-03 cart)"
        role: |
          Soft pink daylily with yellow throat, repeat bloomer. Mid-row
          mass — three plants distributed through the middle of the
          bed, alternating with 'Lullaby Baby' for a pink-cream
          tapestry. Bloom Jun–Aug; dies back to clumping foliage in
          fall.
        deer_note: |
          Highly browsed (Rutgers D — Frequently Severely Damaged).
          Front-row Salvia + Echinacea provide companion-planting
          confusion; expect 30–40% bud loss in heavy years even with
          companions. Active spray rotation (Liquid Fence, 2 weeks)
          recommended during bud formation May–Jul.
        status: ordered (Oakes Daylilies cart 2026-05-03)

      - name: Hemerocallis 'Lullaby Baby'
        common_name: Lullaby Baby Daylily (pale cream-pink, fragrant)
        quantity: 2
        source: Oakes Daylilies (mail-order)
        target_size: "$59.98 for 2 (Oakes price, 2026-05-03 cart)"
        role: |
          Pale cream-pink daylily, classic Stout 1975 introduction —
          fragrant, reliable repeat bloomer, ~20–22" tall. Mid-row
          accents interplanted with 'Chosen Love'. Slightly shorter and
          paler than 'Chosen Love' for visual rhythm.
        deer_note: see 'Chosen Love'
        status: ordered (Oakes Daylilies cart 2026-05-03)

      # Front row — Salvia matched pair (aromatic deer deterrent +
      # white/purple rhythm that echoes the daylily middle row)
      - name: Salvia nemorosa 'White Profusion'
        common_name: White Meadow Sage
        quantity: 3
        source: Stauffer's
        target_size: "#1 container, $19.99 ea ($60 total)"
        role: |
          White flower spikes May–Jul, ~2 ft tall mounding clump. Strong
          sage-family aromatic foliage = primary olfactory deer deterrent
          for the daylily layer behind. Paired with 'Violet Profusion'
          for matched white+purple front-row rhythm that echoes the
          daylily white+purple middle row.
        site_fit: |
          Plant in a tight alternating row with 'Violet Profusion' along
          the front of the bed, between the daylilies and the path edge.
          Deadhead spent spikes for repeat bloom into late summer.
        status: pending Stauffer's stock check (2026-05-03)

      - name: Salvia nemorosa 'Violet Profusion'
        common_name: Violet Meadow Sage
        quantity: 3
        source: Stauffer's
        target_size: "#1 container, $19.99 ea ($60 total)"
        role: |
          Deep violet flower spikes May–Jul, ~2 ft tall mounding clump.
          Identical form to 'White Profusion' but in violet — matched
          pair from the same series. Aromatic deer deterrent. Same
          alternating front-row placement.
        status: pending Stauffer's stock check (2026-05-03)

      # Front mid-mass — additional deer-resistant white anchor between
      # the salvia row and the daylilies
      - name: Echinacea purpurea 'Pow Wow White'
        common_name: White Coneflower
        quantity: 5
        source: Diller
        target_size: "#1 container, $6.50–7.50 ea (~$33–38 total)"
        role: |
          White coneflower mass behind the Salvia row, in front of the
          daylilies. Pure white cones with golden centers Jun–Sep.
          Reinforces the white note from the matched-pair Salvia and
          adds a second deer-resistant deterrent layer that bridges
          path-side to daylily mid-row. Reliably deer-resistant
          (Echinacea is one of the few flowering perennials deer truly
          avoid).
        status: planned (kept from prior design)

      # Front edge — chartreuse mat for year-round coverage
      - name: Sedum 'Angelina'
        common_name: Stonecrop (chartreuse)
        quantity: 5
        source: Diller
        target_size: "#1 container, ~$6.50 ea (~$32 total)"
        role: |
          Front-edge succulent mat, chartreuse-gold foliage year-round —
          the only winter color in the bed after perennials die back.
          Kept from prior design; works as front edge regardless of
          theme. Deer-resistant.
        status: planned (kept from prior design)

      # Bulbs — interplanted throughout for spring + early-summer color
      - name: Narcissus mixed (early/mid/late season)
        common_name: Daffodils
        quantity: 30
        source: Brent and Becky's Bulbs (mail-order) or Van Engelen
        target_size: ~$0.50–1.00 per bulb
        role: |
          Mar–May spring color progression, deer-proof. Interplant
          throughout the bed including under future Buddleia spots.
          Kept from prior design.
        timing: plant fall 2026
        status: tentative — needs sourcing (mail-order, fall 2026)

      - name: Allium 'Mount Everest'
        common_name: White Giant Allium
        quantity: 12
        source: Brent and Becky's Bulbs (mail-order)
        target_size: ~$3–5 per bulb
        role: |
          3–4 ft white drumsticks May–Jun. Palette match for the
          purple+white redesign. Interplant in mid-row pockets between
          daylily clumps for early-season vertical accents before the
          daylilies and salvia hit peak. Kept from prior design.
        timing: plant fall 2026
        status: tentative — needs sourcing (mail-order, fall 2026)

    # Total: 22 perennials + 42 bulbs in 70 sqft. Significantly less

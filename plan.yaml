# Landscaping plan — central PA mountainside, USDA zone 6b–7a.
#
# Each area has site conditions and a plant list. Plants are tagged with their
# source (Diller catalog vs find-elsewhere) so we know what to order from where.
# Quantities are the maximalist starting point — we'll trim as plants mature.
#
# Each area has a `slug` — a stable machine ID used to link the area to its
# photo directory under `areas_originals/<slug>/`. Slugs starting with `sp*`
# match the photographed beds; slugs without a `sp*` prefix (single-tree
# placements like the Honeylocust and Kousa) intentionally have no photo dir.
#
# When this list firms up across all areas, a sync script will load it into
# the SQLite DB (areas + plan_items tables) and the React app will render it
# read-only as a planning view.

areas:
  - name: Front foundation corner
    slug: sp1_shade_front_door
    approx_sqft: 64                   # ~8x8 ft, possibly slightly larger
    sun: full shade                   # bright open shade — no direct sun, but bright reflected light
    exposure: |
      North-facing front-of-house corner. Sheltered by the house from the
      mountain wind (low wind exposure regardless of plant ratings).
      Bright afternoon sun passes by but never lands directly. High indirect
      light all day — ideal "bright open shade" conditions.
    deer_pressure: minimal             # right by front door; deer haven't been observed here
    theme: layered shade with year-round interest
    notes: |
      Visible from front door year-round, so winter interest matters.
      Bloom calendar: Hellebores Feb–Apr, Pulmonaria/Tiarella/Dicentra
      Mar–May, Astilbe + Hosta Jun–Jul, Hydrangea + Hosta Jul–Aug,
      Bugbane + Mahonia + Hakonechloa fall color Aug–Oct, Mahonia
      yellow blooms Feb. Something visible every month.

    plants:
      # Anchors (back of corner)
      - name: Cephalotaxus harringtonia 'Duke Garden'
        common_name: Japanese Plum Yew
        quantity: 1
        source: Diller
        role: Evergreen needled anchor shrub, ~7.5 ft mature, deer-resistant, wind-rated high

      - name: Mahonia x media 'Winter Sun'
        common_name: Mahonia
        quantity: 1
        source: Diller
        role: Second anchor — evergreen holly-like leaves with bright yellow Feb–Mar blooms

      # Mid-layer flowering shrub
      - name: Hydrangea arborescens 'Annabelle'
        common_name: Smooth Hydrangea
        quantity: 1
        source: Diller
        role: White snowball blooms June–September, shade-tolerant, ~4 ft, blooms on new wood

      # Mid-layer evergreen perennial
      - name: Helleborus orientalis 'Ivory Prince'
        common_name: Lenten Rose
        quantity: 3
        source: Diller
        role: Evergreen perennial, late winter / early spring blooms, deer-resistant

      # Spring ephemeral
      - name: Dicentra spectabilis
        common_name: Old-Fashioned Bleeding Heart
        quantity: 1
        source: Diller
        role: Pink heart-shaped spring blooms, dies back midsummer

      # Early-summer plumes
      - name: Astilbe 'Deutschland'
        common_name: Astilbe (white)
        quantity: 3
        source: Diller
        role: Feathery white plumes June–July, ferny foliage all season

      # Bold foliage statement
      - name: Hosta 'Sum and Substance'
        common_name: Giant Chartreuse Hosta
        quantity: 1
        source: Find elsewhere    # Bluestone Perennials, local nursery
        role: Statement large hosta, ~4 ft wide chartreuse foliage; deer-vulnerable but unlikely here

      - name: Hosta 'Patriot'
        common_name: Variegated Hosta
        quantity: 2
        source: Find elsewhere
        role: Mid-size variegated white-edge, brightens corner

      # Foliage palette (orange/burgundy via Heuchera)
      - name: Heuchera 'Caramel'
        common_name: Coral Bells (caramel)
        quantity: 1
        source: Diller
        role: Caramel-orange foliage; deer-resistant alternative palette

      - name: Heuchera 'Palace Purple'
        common_name: Coral Bells (burgundy)
        quantity: 1
        source: Diller
        role: Burgundy foliage all season

      # Silver foliage / spring color
      - name: Pulmonaria 'Mrs. Moon'
        common_name: Lungwort
        quantity: 3
        source: Find elsewhere    # Bluestone Perennials
        role: Silver-spotted leaves all season, pink-to-blue spring blooms

      # Fall grass
      - name: Hakonechloa macra 'Aureola'
        common_name: Japanese Forest Grass
        quantity: 3
        source: Diller
        role: Chartreuse arching grass; pink-copper fall color; needs bright indirect light to keep color

      # Late-summer vertical accent
      - name: Actaea racemosa
        common_name: Black Cohosh / Bugbane
        quantity: 1
        source: Find elsewhere    # PA native nursery (Bowman's Hill) or Bluestone
        role: PA native, 4–6 ft white spires August–September

      # Sept-Oct bloom
      - name: Tricyrtis hirta
        common_name: Toad Lily
        quantity: 2
        source: Find elsewhere
        role: Orchid-like spotted purple blooms September–October

      # Native ground cover
      - name: Tiarella cordifolia
        common_name: Foamflower
        quantity: 5
        source: Find elsewhere    # PA native nursery (Bowman's Hill) preferred
        role: PA native, white foamy spring spikes, red-bronze fall foliage, slowly spreading

      # Fragrant ground cover
      - name: Galium odoratum
        common_name: Sweet Woodruff
        quantity: 3
        source: Diller
        role: Full-shade ground cover; fragrant white May flowers; complements Tiarella texturally

    # Total: 32 plants in 64 sqft. Maximalist density — trim as plants establish.
    # Trim-first candidates if too dense after season 1:
    #   - Drop one of the Heucheras (role covered by hostas + pulmonaria)
    #   - Pulmonaria 3 → 2
    #   - Tiarella 5 → 4 (they spread, gaps fill naturally)

  - name: Driveway shade
    slug: driveway_shade_tree         # single-tree placement — no photo dir
    sun: full sun
    exposure: |
      Open driveway alongside / edge planting. Goal is to shade the driveway
      surface to keep asphalt cooler and the area more comfortable.
      Mountainside wind exposure (deep tap roots required so the tree anchors
      well; no surface-rooted species near the driveway pavement).
    notes: |
      Two-tree staggered approach being considered:
        1. Plant the 2-2.5" cal Honeylocust 'Skyline' from Diller THIS WEEK
           (late April 2026 — tail end of spring B&B window, but Honeylocust
           leafs out late so it's still effectively dormant; planting now is
           viable with aggressive watering through summer).
        2. Optionally pair with a 4-5" cal Honeylocust from a central-PA
           landscape contractor (Black Landscape Center, Stauffer's of Kissel
           Hill, or via Bartlett/Davey wholesale) installed in FALL 2026 —
           the optimal window for large B&B. Budget ~$2500-3500 installed.
      This area's full plant list is still being designed — committed now
      so the Honeylocust acquisition isn't held up.

    plants:
      - name: Gleditsia triacanthos inermis 'Skyline'
        common_name: Honeylocust (thornless)
        quantity: 1
        source: Diller
        target_size: 2-2.5" caliper (~10-11 ft tall, $194)
        role: |
          Primary driveway shade tree. Rapid grower, deep tap root (won't
          buckle pavement), tiny pinnate leaflets that don't need raking,
          high wind tolerance for the mountainside, filtered dappled shade.
          Plant 15-20 ft off driveway edge. Stake (mountainside wind),
          mulch ring, soaker hose for first season.
        status: planning to acquire late April 2026

      # TODO — fall 2026 contractor specimen:
      # - name: Gleditsia triacanthos inermis 'Skyline' (4-5" cal specimen)
      #   quantity: 1
      #   source: Black Landscape Center / contractor (B&B from regional wholesaler)
      #   target_size: 4-5" caliper (~17-20 ft tall, ~$2500-3500 installed)
      #   role: Pair with Diller-sized tree for shade-now + shade-later staggering.
      #   timing: install Sept-Nov 2026 (optimal large-B&B window)

  - name: Hillside flowering tree
    slug: hillside_kousa              # single-tree placement — no photo dir
    sun: full sun                      # TODO confirm — assumed full sun, may be part sun if house casts a long shadow
    exposure: |
      Mountainside slope, planted a few feet above the bottom of the hill
      (not at the very bottom — sited up the slope for good drainage and
      to climb out of the cold-air pocket). House provides partial wind
      shelter; some winter wind exposure remains.
    deer_pressure: moderate            # mountainside; kousa rated high deer-resistance
    theme: spring/summer flowering tree with year-round interest
    notes: |
      Site prep on a slope: level the planting hole into a small shelf,
      build a low berm on the downhill side so water soaks the rootball
      instead of running off. Mulch 3 in deep out to the dripline — kousa
      is shallow-rooted and a slope dries faster than flat ground.
      Color calendar: May-Jun green-aging-to-white bracts (4-6 weeks) →
      Jul glossy green leaves → Aug-Sep pink-red strawberry-like fruits →
      Oct scarlet-burgundy fall color → winter mottled exfoliating bark
      + tiered horizontal branching.

    plants:
      - name: Cornus kousa 'Celestial'
        common_name: Kousa Dogwood (Stellar series)
        quantity: 1
        source: Diller
        target_size: 2.5-3" caliper (~10-12 ft tall, $187 — id 167)
        alternatives:
          - "6-7 ft B&B (id 170, $117) — value option, adds ~2 yrs to 'shade + flowers' timeline"
          - "5-6 ft container (id 169, $92) — cheapest entry, adds ~3 yrs"
        role: |
          Hillside flowering tree. Heavy-blooming Stellar-series hybrid
          (kousa × florida, Rutgers); white pointed bracts held upward
          on tiered branches May-Jun, hold 4-6 weeks. Pink-red
          raspberry-like fruits Aug-Sep (birds love them). Reliable
          scarlet-burgundy fall color. Mottled exfoliating bark develops
          after ~10 yrs for winter interest. Slow grower (12-18 in/yr);
          2.5-3" cal start gets meaningful shade in 2-3 seasons.
        status: planning to acquire 2026

  - name: Driveway entrance corner (mirrored)
    slug: sp3_full_sun_driveway_sides
    approx_sqft: 20                     # 4 ft × 5 ft each
    multiplier: 2                       # mirrored on both sides of entrance
    sun: full sun
    exposure: |
      Roadside corner planting at the driveway entrance. Open mountainside
      with no overhead canopy. NO water access — these have to live on
      rainfall alone after year 1. Drought-bombproof palette only.
      Mountain wind exposure. Mirrored on both sides of the entrance.
    palette_intent: |
      Lavender (only purple), apricot, white, yellow, with chartreuse
      groundcover at the front edge. Less pink than original draft.
    notes: |
      Bloom calendar: Mar-Apr Daffodils → May Lavender opens + white Allium
      → Jun-Sep Achillea apricot + Echinacea white + Lavender continues →
      Sep-Oct Sedum 'Autumn Joy' coral fall accent → winter Spiraea
      structure + Lavender semi-evergreen + Sedum dried heads + Sedum
      'Angelina' chartreuse evergreen mat. See plan_layouts/corner_layout.png.

    plants:
      # Back row (toward road, 1.5-2.5 ft tall)
      - name: Spiraea japonica 'Goldmound'
        common_name: Spiraea
        quantity: 1
        source: Diller
        status: planned
        role: Back-center anchor; gold foliage Apr-Oct

      - name: Lavandula angustifolia 'Munstead'
        common_name: English Lavender
        quantity: 2
        source: Diller
        status: planned
        role: Back-flanking the anchor; the only purple in the design; semi-evergreen blue-grey winter foliage

      - name: Achillea 'Apricot Delight'
        common_name: Yarrow (apricot)
        quantity: 2
        source: Bluestone Perennials (mail-order) — also try Stauffer's of Kissel Hill on arrival
        status: tentative
        alternatives:
          - "Achillea 'Terracotta' (peach-rust tone)"
          - "Achillea 'Strawberry Seduction' (red-orange) — slightly warmer"
          - "Agastache 'Apricot Sunrise' (different form, similar color)"
        role: Apricot-peach Jun-Sep, ferny silver-grey foliage; drought-bombproof

      # Mid row (1.5 ft tall)
      - name: Echinacea purpurea 'Pow Wow White'
        common_name: White Coneflower
        quantity: 2
        source: Diller
        status: planned
        role: Mid-row drift; PA native, Jun-Sep blooms

      - name: Sedum 'Autumn Joy'
        common_name: Autumn Stonecrop
        quantity: 2                     # reduced from 3 to dial back coral-pink
        source: Diller
        status: planned
        role: Coral-rust Sep-Oct + winter dried heads

      # Front edge (chartreuse groundcover)
      - name: Sedum 'Angelina'
        common_name: Stonecrop (chartreuse)
        quantity: 3
        source: Diller
        status: planned
        role: Front-edge succulent mat; chartreuse-gold foliage year-round, low (4-6 in)

      # Bulbs (fall plant for next spring)
      - name: Allium 'Mount Everest'
        common_name: White Giant Allium
        quantity: 5
        source: Brent and Becky's Bulbs / Van Engelen (mail-order)
        status: tentative
        alternatives:
          - "Allium 'Mount Everest' is the primary — 3-4 ft white drumsticks"
          - "Allium 'White Giant' (different cultivar, similar look)"
          - "Allium nigrum (white star-shaped clusters)"
        role: White vertical accents May-Jun (replaces purple 'Purple Sensation' from earlier draft); interplant in mid-row pockets
        timing: plant fall 2026 for spring 2027 bloom

      - name: Narcissus 'Tête-à-Tête'
        common_name: Mini Daffodil
        quantity: 12
        source: Brent and Becky's Bulbs (mail-order)
        status: tentative
        alternatives:
          - "Narcissus 'February Gold' (slightly larger, earliest)"
          - "Mixed mini-daffodil collection (any of several yellow cvs)"
        role: Earliest spring color — 6 in yellow Mar-Apr; deer-proof
        timing: plant fall 2026

    # Per corner: 12 perennials + 17 bulbs. ×2 (mirrored) = 24 perennials + 34 bulbs total.

  # ↓ TOP BED — see below

  - name: Driveway top bed
    slug: sp5_full_sun_driveway_top
    approx_sqft: 70                     # 14 ft × 5 ft
    sun: full sun
    exposure: |
      Linear bed at the top of the driveway. Open mountainside with no
      overhead shade. Drip irrigation possible (run a hose loop along the
      back) — used as backup during drought, not life support. Plants
      still skewed drought-tolerant as the dominant strategy.
    palette_intent: |
      Lavender (only purple), with strong blue (Veronica + Ceratostigma +
      Agastache + Baptisia), apricot/orange (Achillea + Asclepias +
      Echinacea apricot), yellow (Coreopsis + Rudbeckia + Sedum 'Angelina'),
      and white (Echinacea white + Allium 'Mount Everest'). Less pink than
      the original draft — Sedum 'Autumn Joy' is the only pink-leaning
      plant, kept for fall transition and winter structure.
    notes: |
      Bloom calendar: Mar-May Daffodils → May-Jun Baptisia indigo + Lavender
      + white Allium → Jun-Aug Veronica blue + Achillea apricot + Echinacea
      white + Asclepias orange + Echinacea apricot → Jul-Sep Coreopsis +
      Rudbeckia + Agastache blue → Aug-Oct Ceratostigma cobalt blue + Sedum
      'Autumn Joy' coral → winter Spiraea structure + Sedum dried heads +
      Sedum 'Angelina' chartreuse evergreen mat + Heuchera 'Caramel' +
      Lavender semi-evergreen + Ceratostigma red-burgundy fall foliage.
      See plan_layouts/top_layout.png for top-down spatial diagram.

    plants:
      # Back row (2.5-4 ft tall)
      - name: Baptisia australis
        common_name: Wild Indigo (PA native)
        quantity: 1
        source: Octoraro Native Plant Nursery (~50 min from Harrisburg) or Edge of the Woods (Allentown ~90 min) or Bluestone (mail-order)
        status: tentative
        alternatives:
          - "Baptisia 'Decadence Deluxe' series — many color cultivars, yellow/blue/cream"
          - "Baptisia 'Twilite Prairieblues' (smoky purple-yellow bicolor)"
        role: Tallest back-row structural piece; deep blue-violet spires May-Jun, shrub-sized (3-4 ft × 4 ft); deep tap root, drought-bombproof, PA native

      - name: Veronica spicata 'Royal Candles'
        common_name: Spike Speedwell
        quantity: 5                     # increased from 3 — Veronica is the only blue Diller carries
        source: Diller
        status: planned
        role: True blue spikes Jun-Aug; vertical accents distributed across back/mid

      - name: Lavandula angustifolia 'Phenomenal'
        common_name: Phenomenal Lavender
        quantity: 3
        source: Diller
        status: planned
        role: Back-row drift; the only purple in the design; heat-tolerant cultivar, semi-evergreen blue-grey foliage

      - name: Achillea 'Apricot Delight'
        common_name: Yarrow (apricot)
        quantity: 3
        source: Bluestone Perennials (mail-order) — also try Stauffer's
        status: tentative
        alternatives:
          - "Achillea 'Terracotta' (peach-rust)"
          - "Achillea 'Strawberry Seduction' (red-orange)"
        role: Apricot-peach blooms Jun-Sep + silver-grey ferny foliage; drought-bombproof

      - name: Agastache 'Blue Fortune'
        common_name: Anise Hyssop (blue)
        quantity: 3
        source: Bluestone Perennials (mail-order) — also try local nursery on arrival
        status: tentative
        alternatives:
          - "Agastache 'Black Adder' (deeper purple-blue)"
          - "Agastache 'Apricot Sunrise' (apricot — would shift the role to a 2nd apricot drift)"
          - "Agastache 'Blue Boa' (taller, larger blooms)"
        role: Sky-blue spikes Jul-Sep, hummingbird magnet, fragrant foliage; replaces Liatris's vertical role

      # Mid row — 2 ft tall, summer flower mass
      - name: Asclepias tuberosa
        common_name: Butterfly Weed (orange, PA native)
        quantity: 3
        source: Stauffer's of Kissel Hill (Linglestown — call first, may have orange or only 'Hello Yellow') / Octoraro / mail-order
        status: tentative
        alternatives:
          - "Asclepias tuberosa 'Hello Yellow' (yellow form — confirmed at Stauffer's)"
          - "Asclepias incarnata (Swamp Milkweed — pink, prefers moisture, less drought-tough)"
        role: Bright orange Jun-Aug, monarch host plant, deep tap root; drought-bombproof, PA native

      - name: Echinacea 'Sundown'
        common_name: Coneflower (apricot)
        quantity: 3
        source: Bluestone Perennials (mail-order)
        status: tentative
        alternatives:
          - "Echinacea 'Hot Papaya' (more orange, double blooms)"
          - "Echinacea 'Tomato Soup' (red shift)"
          - "Echinacea 'Sunset' (apricot-coral)"
        role: Apricot-orange cones; pairs with Asclepias for warm tones in mid-row

      - name: Spiraea japonica 'Goldmound'
        common_name: Spiraea
        quantity: 1
        source: Diller
        status: planned
        role: Mid-row anchor; gold foliage Apr-Oct + brief pink Jul flowers (kept despite small pink contribution for the foliage value)

      - name: Echinacea purpurea 'Pow Wow White'
        common_name: White Coneflower
        quantity: 5
        source: Diller
        status: planned
        role: Mid-row mass; pure white cones Jun-Sep, PA native

      # Mid-front (1-1.5 ft, yellow / blue / sedum band)
      - name: Coreopsis verticillata 'Moonbeam'
        common_name: Threadleaf Coreopsis
        quantity: 5
        source: Diller
        status: planned
        role: Soft yellow Jun-Sep, ferny foliage, drought-tolerant

      - name: Rudbeckia fulgida 'Goldsturm'
        common_name: Black-Eyed Susan
        quantity: 5
        source: Diller
        status: planned
        role: Bold golden Jul-Oct, PA native, long bloom

      - name: Sedum 'Autumn Joy'
        common_name: Autumn Stonecrop
        quantity: 3                     # reduced from 5 (less pink)
        source: Diller
        status: planned
        role: Coral-rust Sep + winter dried heads (the only pink-leaning plant kept; reduced count)

      - name: Ceratostigma plumbaginoides
        common_name: Hardy Plumbago
        quantity: 3
        source: Diller
        status: planned
        role: True cobalt-blue blooms Aug-Oct (rare late-summer blue) + red-burgundy fall foliage; low-spreading, drought-tolerant

      # Front edge (6 in - 1 ft)
      - name: Heuchera 'Caramel'
        common_name: Coral Bells (caramel-orange)
        quantity: 3
        source: Diller
        status: planned
        role: Caramel-orange foliage all season (replaces 'Palace Purple' burgundy); needs occasional irrigation in this drier site

      - name: Sedum 'Angelina'
        common_name: Stonecrop (chartreuse)
        quantity: 5
        source: Diller
        status: planned
        role: Front-edge succulent mat; chartreuse-gold foliage year-round, replaces Liriope/Dianthus front-edge role

      # Bulbs (fall plant for next spring)
      - name: Narcissus mixed (early/mid/late season)
        common_name: Daffodils
        quantity: 30
        source: Brent and Becky's Bulbs (mail-order) or Van Engelen
        status: tentative
        alternatives:
          - "Mixed-season collections from any major bulb supplier"
        role: Mar-May spring color progression; deer-proof; interplant throughout
        timing: plant fall 2026

      - name: Allium 'Mount Everest'
        common_name: White Giant Allium
        quantity: 12
        source: Brent and Becky's Bulbs (mail-order)
        status: tentative
        alternatives:
          - "Allium nigrum (smaller, white star-clusters)"
          - "Allium 'White Giant' (similar)"
        role: 3-4 ft white drumsticks May-Jun (replaces purple 'Purple Sensation'); interplant in mid-row pockets
        timing: plant fall 2026

    # Total: ~50 perennials + 42 bulbs in 70 sqft. Maximalist density.

